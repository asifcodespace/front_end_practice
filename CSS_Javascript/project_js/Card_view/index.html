<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">Our Products</h1>

  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" />
      <div class="card-body">
        <h3>Smart Watch</h3>
        <p>Modern smart watch for daily use.</p>
        <span>$120</span>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" />
      <div class="card-body">
        <h3>Headphone</h3>
        <p>High quality sound & comfort.</p>
        <span>$80</span>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" />
      <div class="card-body">
        <h3>Mobile Phone</h3>
        <p>Fast performance & clean design.</p>
        <span>$450</span>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" />
      <div class="card-body">
        <h3>Shoes</h3>
        <p>Comfortable shoes for daily walk.</p>
        <span>$60</span>
        <button>Add to Cart</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
