<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Something is being cooked!</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      color: white;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .scene {
      position: relative;
      width: 300px;
      height: 300px;
    }

    /* POT */
    .pot {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 90px;
      background: #555;
      border-radius: 0 0 30px 30px;
    }

    .pot::before {
      content: "";
      position: absolute;
      top: -20px;
      width: 100%;
      height: 20px;
      background: #666;
      border-radius: 20px 20px 0 0;
    }

    .handle {
      position: absolute;
      top: 25px;
      width: 40px;
      height: 20px;
      border: 4px solid #777;
      border-color: #777 transparent transparent transparent;
      border-radius: 50%;
    }

    .handle.left {
      left: -30px;
    }

    .handle.right {
      right: -30px;
    }

    /* FIRE */
    .fire {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .flame {
      width: 20px;
      height: 40px;
      background: orange;
      border-radius: 50%;
      animation: flicker 0.4s infinite alternate;
    }

    .flame:nth-child(2) {
      height: 50px;
      background: red;
    }

    .flame:nth-child(3) {
      height: 35px;
      background: yellow;
    }

    @keyframes flicker {
      from {
        transform: scaleY(1);
        opacity: 0.8;
      }
      to {
        transform: scaleY(1.3);
        opacity: 1;
      }
    }

    /* STEAM */
    .steam {
      position: absolute;
      bottom: 180px;
      left: 50%;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: rise 3s infinite;
    }

    .steam.one {
      margin-left: -30px;
    }

    .steam.two {
      animation-delay: 1s;
    }

    .steam.three {
      margin-left: 30px;
      animation-delay: 2s;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.7;
      }
      100% {
        transform: translateY(-80px) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>Something is being cooked!</h1>

  <div class="scene">

    <!-- Steam -->
    <div class="steam one"></div>
    <div class="steam two"></div>
    <div class="steam three"></div>

    <!-- Pot -->
    <div class="pot">
      <div class="handle left"></div>
      <div class="handle right"></div>
    </div>

    <!-- Fire -->
    <div class="fire">
      <div class="flame"></div>
      <div class="flame"></div>
      <div class="flame"></div>
    </div>

  </div>

  <script>
    // Optional JS for future experiments
    console.log("Something is being cooked!");
  </script>

</body>
</html>
